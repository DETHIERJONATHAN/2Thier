# ============================================================================
# WORKFLOW CI/CD OBLIGATOIRE - DÉPLOIEMENT AUTOMATIQUE SUR CLOUD RUN
# ============================================================================
# Ce workflow se déclenche automatiquement à chaque push sur main
# Il est IMPOSSIBLE de contourner ce processus
# 
# Étapes :
# 1. Checkout du code
# 2. Installation des dépendances
# 3. Génération du client Prisma (OBLIGATOIRE)
# 4. Build du frontend et du serveur (OBLIGATOIRE)
# 5. Déploiement sur Cloud Run via source deploy (sans Docker)
# ============================================================================

name: 🚀 Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permet le déclenchement manuel si besoin

env:
  PROJECT_ID: thiernew
  REGION: europe-west1
  SERVICE_NAME: crm-api

jobs:
  deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    
    # Permissions nécessaires pour l'authentification Google Cloud
    permissions:
      contents: read
      id-token: write

    steps:
      # ============================================
      # 1. CHECKOUT DU CODE
      # ============================================
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ============================================
      # 2. CONFIGURATION NODE.JS
      # ============================================
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ============================================
      # 3. INSTALLATION DES DÉPENDANCES
      # ============================================
      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      # ============================================
      # 4. GÉNÉRATION PRISMA (OBLIGATOIRE)
      # ============================================
      - name: 🔧 Generate Prisma Client
        run: npx prisma generate

      # ============================================
      # 5. BUILD COMPLET (OBLIGATOIRE)
      # ============================================
      - name: 🏗️ Build application
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BACKEND_URL: https://www.zhiive.com
          VITE_FRONTEND_URL: https://www.zhiive.com

      # ============================================
      # 6. AUTHENTIFICATION GOOGLE CLOUD
      # ============================================
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      # ============================================
      # 7. CONFIGURATION GCLOUD CLI
      # ============================================
      - name: ☁️ Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ============================================
      # 8. BUILD & PUSH IMAGE (ARTIFACT REGISTRY)
      # ============================================
      - name: 🧱 Build & Push Docker Image
        run: |
          IMAGE_URL="europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/crm-api/crm-api"
          BUILD_ID=$(gcloud builds submit \
            --project ${{ env.PROJECT_ID }} \
            --tag "$IMAGE_URL" \
            --async \
            --format='value(id)')
          echo "Build ID: $BUILD_ID"
          
          # Attendre la fin du build (VPC-SC bloque le streaming)
          echo "⏳ Attente de la fin du build..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --project ${{ env.PROJECT_ID }} --format='value(status)')
            echo "Status: $STATUS"
            if [[ "$STATUS" == "SUCCESS" ]]; then
              echo "✅ Build réussi !"
              break
            elif [[ "$STATUS" == "FAILURE" ]] || [[ "$STATUS" == "TIMEOUT" ]] || [[ "$STATUS" == "CANCELLED" ]]; then
              echo "❌ Build échoué avec status: $STATUS"
              exit 1
            fi
            sleep 10
          done
          
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      # ============================================
      # 9. DÉPLOIEMENT CLOUD RUN (IMAGE)
      # ============================================
      - name: 🚀 Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE_URL" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 300 \
            --concurrency 80 \
            --cpu-boost \
            --port 8080 \
            --add-cloudsql-instances thiernew:europe-west1:crm-postgres-prod \
            --set-env-vars "NODE_ENV=production,PGHOST=/cloudsql/thiernew:europe-west1:crm-postgres-prod,PGDATABASE=2thier,PGUSER=postgres,FRONTEND_URL=https://www.zhiive.com,BACKEND_URL=https://www.zhiive.com,GCS_BUCKET=crm-2thier-uploads,SMTP_HOST=send.one.com,SMTP_PORT=465,SMTP_USER=contact@zhiive.com,SMTP_FROM=contact@zhiive.com,POSTAL_API_URL=https://postal.zhiive.com,POSTAL_SMTP_HOST=postal.zhiive.com,POSTAL_SMTP_PORT=25,POSTAL_SMTP_USER=zhiive-mail,DEFAULT_EMAIL_DOMAIN=zhiive.com,SEARXNG_URL=http://46.225.180.8:8888,VAPID_SUBJECT=mailto:contact@zhiive.com" \
            --update-secrets "PGPASSWORD=crm-postgres-password:latest,JWT_SECRET=JWT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,CRYPTO_SECRET_KEY=CRYPTO_SECRET_KEY:latest,GOOGLE_AI_API_KEY=GOOGLE_AI_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,SMTP_PASS=SMTP_PASS:latest,POSTAL_API_KEY=POSTAL_API_KEY:latest,POSTAL_SMTP_PASS=POSTAL_SMTP_PASS:latest,POSTAL_WEBHOOK_SECRET=POSTAL_WEBHOOK_SECRET:latest,VAPID_PUBLIC_KEY=VAPID_PUBLIC_KEY:latest,VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest"

      # ============================================
      # 10. AFFICHER L'URL DU SERVICE
      # ============================================
      - name: 🌐 Get Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "🎉 Service déployé sur: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      # ============================================
      # 11. VÉRIFICATION DE SANTÉ
      # ============================================
      - name: 🏥 Health Check
        run: |
          echo "⏳ Attente de 10 secondes pour le démarrage du service..."
          sleep 10
          echo "🔍 Vérification de la santé du service..."
          curl -f -s "${{ env.SERVICE_URL }}/api/health" || echo "⚠️ Health check failed, mais le déploiement a réussi"
