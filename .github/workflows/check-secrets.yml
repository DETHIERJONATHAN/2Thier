name: Check Required Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets presence
        env:
          MUST_HAVE: |
            DATABASE_URL
            JWT_SECRET
            SESSION_SECRET
            FRONTEND_URL
            API_URL
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
            GOOGLE_REDIRECT_URI
            GOOGLE_AI_API_KEY
        run: |
          missing=()
          while read -r key; do
            [ -z "$key" ] && continue
            val="${{ secrets.DUMMY || '' }}" # noop
            eval "val=\"${{ secrets.${key} }}\""
            if [ -z "$val" ]; then
              missing+=("$key")
            fi
          done <<< "$MUST_HAVE"
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Secrets manquants: ${missing[*]}" >&2
            exit 1
          fi
          echo "Tous les secrets requis sont présents."
