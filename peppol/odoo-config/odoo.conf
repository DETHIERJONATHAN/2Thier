[options]
; Odoo headless configuration for Zhiive Peppol bridge
; This instance is NOT user-facing - it's controlled via JSON-RPC by Zhiive

; Admin credentials (change in production!)
admin_passwd = zhiive_odoo_admin_2026

; Database
db_host = odoo-db
db_port = 5432
db_user = odoo
db_password = odoo_peppol_secret
db_name = odoo_peppol
db_maxconn = 16
db_template = template0

; Performance (headless mode - minimal resources)
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; Logging
log_level = warn
log_handler = :WARNING,odoo.addons.account_peppol:INFO

; Security
list_db = False
proxy_mode = True

; Modules à installer
server_wide_modules = base,web

; Cron Peppol - Vérification des documents entrants
; Le cron natif d'Odoo vérifie les documents Peppol entrants toutes les 4h
; Le bridge Zhiive peut aussi déclencher manuellement via JSON-RPC
