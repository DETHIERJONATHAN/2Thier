# Nginx Reverse Proxy — TLS termination pour Odoo Peppol Headless
# Le trafic JSON-RPC de Zhiive arrive en HTTPS et est relayé en HTTP vers Odoo.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    # ── Sécurité de base ──
    server_tokens off;
    client_max_body_size 50m;

    # ── Timeouts adaptés aux appels JSON-RPC longs (envoi factures Peppol) ──
    proxy_connect_timeout 30s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    # ── Rate limiting — protection contre les abus ──
    limit_req_zone $binary_remote_addr zone=jsonrpc:10m rate=30r/m;

    # ── Upstream Odoo ──
    upstream odoo_backend {
        server odoo:8069;
    }

    # ── HTTP — accessible en interne (Zhiive Cloud Run → Hetzner) ──
    server {
        listen 80;
        server_name _;

        # Health check
        location /web/health {
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
        }

        # JSON-RPC endpoints (pour le bridge Node.js)
        location /jsonrpc {
            limit_req zone=jsonrpc burst=10 nodelay;
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /web/session/authenticate {
            limit_req zone=jsonrpc burst=5 nodelay;
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /web/dataset/call_kw {
            limit_req zone=jsonrpc burst=10 nodelay;
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /web/dataset/call_button {
            limit_req zone=jsonrpc burst=10 nodelay;
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bloquer tout le reste en HTTP
        location / {
            return 403;
        }
    }

    # ── HTTPS (TLS) ──
    server {
        listen 443 ssl;
        server_name _;

        # ── Certificats TLS ──
        # En production : remplacer par des certificats Let's Encrypt ou certificats de domaine
        # Générer les auto-signés : ./peppol/nginx/generate-certs.sh
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # ── TLS Hardening ──
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ──
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Autoriser uniquement JSON-RPC (pas d'accès UI Odoo) ──
        # Health check
        location /web/health {
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # JSON-RPC endpoint (seul accès nécessaire pour Zhiive)
        location /jsonrpc {
            limit_req zone=jsonrpc burst=10 nodelay;

            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Web endpoints nécessaires pour l'authentification et les datasets
        location /web/session/authenticate {
            limit_req zone=jsonrpc burst=5 nodelay;

            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /web/dataset/call_kw {
            limit_req zone=jsonrpc burst=10 nodelay;

            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /web/dataset/call_button {
            limit_req zone=jsonrpc burst=10 nodelay;

            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ⛔ Bloquer tout le reste (pas d'accès UI Odoo)
        location / {
            return 403;
        }
    }
}
