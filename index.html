    <title>Zhiive — Votre ruche vivante.</title>
    <!-- 📊 Analytics: Google Analytics 4 (chargé via src/lib/analytics.ts) -->
    <!-- �🔧 Configuration d'environnement runtime INLINE (AVANT tout code) -->
    <script>
      (function() {
        // Déterminer si c'est production ou développement
        // Liste des domaines qui utilisent URLs relatives (proxy ou même serveur pour API)
        const relativeUrlDomains = [
          'zhiive.com',       // Production principale
          '2thier.be',
          'devis1min.be',
          'railway.app',      // Railway deployments
          'up.railway.app',   // Railway preview URLs
          'github.dev',       // GitHub Codespaces (proxy Vite)
          'codespaces.new'    // GitHub Codespaces alternate
        ];
        
        const hostname = window.location.hostname;
        const useRelativeUrls = relativeUrlDomains.some(domain => hostname.includes(domain));

        // En local dev (localhost), utiliser les URLs relatives pour passer par le proxy Vite (/api → localhost:4000)
        // Cela évite les problèmes CORS et de cookies cross-origin
        const isLocalDev = hostname === 'localhost' || hostname === '127.0.0.1';
        const apiBaseUrl = (useRelativeUrls || isLocalDev) ? '' : '';
        
        // Injecter les configurations globales IMMÉDIATEMENT
        window.__API_BASE_URL = apiBaseUrl;
        window.__BACKEND_URL = apiBaseUrl;
        
        console.log('[ENV-CONFIG] API Base URL:', apiBaseUrl || '(relative - using proxy)');
        console.log('[ENV-CONFIG] Host:', hostname);
        console.log('[ENV-CONFIG] Mode:', useRelativeUrls ? 'PROXY/PRODUCTION' : 'LOCAL DEV');

        // 📱 Mettre à jour le titre et meta PWA dynamiquement depuis le manifest
        fetch('/manifest.webmanifest')
          .then(function(r) { return r.json(); })
          .then(function(m) {
            if (m && m.name) {
              document.title = m.name;
              var appleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
              if (appleMeta) appleMeta.setAttribute('content', m.short_name || m.name);
            }
          })
          .catch(function() { /* fallback silencieux */ });
      })();
    </script>
