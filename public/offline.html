<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zhiive — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #6C5CE7;
      margin-bottom: 12px;
    }
    p {
      color: #94a3b8;
      font-size: 1rem;
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .retry-btn {
      background: #6C5CE7;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #5a4fd4; }
    .brand {
      position: fixed;
      bottom: 24px;
      font-size: 0.8rem;
      color: #4a5568;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">🐝</div>
  <h1>La Ruche dort…</h1>
  <p>
    Vous êtes hors connexion. Vérifiez votre connexion Internet et réessayez.
    Les données déjà chargées restent disponibles.
  </p>
  <button class="retry-btn" onclick="window.location.reload()">
    Réessayer
  </button>
  <span class="brand">Zhiive — The Hive</span>
</body>
</html>
